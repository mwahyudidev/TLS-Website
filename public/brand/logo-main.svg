<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <!-- Icon mark: teal circle with fish -->
  <circle cx="30" cy="30" r="28" fill="#0f766e"/>
  <!-- Water/wave fill at bottom -->
  <path d="M4 34 Q12 28 20 34 Q28 40 36 34 Q44 28 56 34 L58 52 Q30 58 2 52 Z" fill="#0d9488"/>
  <!-- Fish body -->
  <ellipse cx="29" cy="26" rx="11" ry="7.5" fill="white" opacity="0.95"/>
  <!-- Fish tail -->
  <path d="M39.5 26 L47 19 L47 33 Z" fill="white" opacity="0.95"/>
  <!-- Fish eye -->
  <circle cx="21" cy="24.5" r="2" fill="#0f766e"/>
  <circle cx="20.5" cy="24" r="0.7" fill="white"/>
  <!-- Fin on top -->
  <path d="M25 19.5 Q30 14 35 19.5" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="70" y="24" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" fill="#0f766e" letter-spacing="-0.3">The Line</text>
  <text x="71" y="41" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="700" fill="#0d9488" letter-spacing="3.5">SEAFOOD</text>
  <!-- SG tag -->
  <rect x="162" y="33" width="22" height="11" rx="2.5" fill="#0f766e"/>
  <text x="173" y="42" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">SG</text>
</svg>
